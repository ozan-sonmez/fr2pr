<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a2340">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Le Français</title>

  <script src="data-a2.js"></script>

  <style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap');
:root {
  --navy:#1a2340; --cream:#f5f0e8; --gold:#c9a84c; --gold-light:#e8d5a3;
  --white:#ffffff; --gray-100:#f8f6f2; --gray-200:#ede9e1; --gray-400:#9e9789;
  --gray-600:#6b6560; --gray-800:#3d3a35;
  --success:#27ae60; --warning:#f39c12; --danger:#e74c3c; --blue:#2980b9;
  --masc:#1a3a6e; --masc-light:#00aaff; --masc-text:#e8f3ff;
  --fem:#6e1a2e; --fem-light:#ff3355; --fem-text:#ffe8ef;
  --shadow-sm:0 2px 8px rgba(26,35,64,0.08);
  --shadow-md:0 8px 24px rgba(26,35,64,0.12);
  --shadow-lg:0 20px 60px rgba(26,35,64,0.18);
  --radius:16px; --radius-sm:10px;
  --transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--navy);min-height:100vh;overflow-x:hidden;}

/* HEADER */
.app-header{background:var(--navy);padding:0 20px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-md);}
.header-inner{max-width:480px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:58px;}
.app-logo{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--gold);letter-spacing:.02em;display:flex;align-items:center;gap:8px;}
.header-right{display:flex;align-items:center;gap:10px;}
.lang-toggle{display:flex;background:rgba(255,255,255,0.1);border-radius:20px;padding:3px;gap:2px;}
.lang-btn{padding:4px 12px;border:none;background:transparent;color:rgba(255,255,255,0.6);font-size:.75rem;font-weight:600;border-radius:16px;cursor:pointer;transition:var(--transition);font-family:'DM Sans',sans-serif;}
.lang-btn.active{background:var(--gold);color:var(--navy);}
.menu-btn{background:none;border:none;color:var(--white);font-size:1.4rem;cursor:pointer;padding:4px 8px;border-radius:8px;transition:var(--transition);}
.menu-btn:hover{background:rgba(255,255,255,0.1);}

/* SIDE MENU */
.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;}
.menu-overlay.open{opacity:1;pointer-events:all;}
.side-menu{position:fixed;top:0;right:-280px;width:280px;height:100vh;background:var(--white);z-index:201;transition:right .3s cubic-bezier(.4,0,.2,1);box-shadow:var(--shadow-lg);display:flex;flex-direction:column;}
.side-menu.open{right:0;}
.side-menu-header{background:var(--navy);padding:20px;display:flex;align-items:center;justify-content:space-between;}
.side-menu-title{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.1rem;}
.side-menu-close{background:none;border:none;color:var(--white);font-size:1.3rem;cursor:pointer;}
.side-menu-item{display:flex;align-items:center;gap:14px;padding:16px 20px;border:none;background:none;width:100%;text-align:left;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:500;color:var(--navy);border-bottom:1px solid var(--gray-100);transition:var(--transition);}
.side-menu-item:hover{background:var(--gray-100);}
.side-menu-item.active{color:var(--gold);background:var(--gray-100);}
.side-menu-icon{font-size:1.2rem;width:28px;text-align:center;}

/* PAGE */
.page{display:none;max-width:480px;margin:0 auto;padding:20px 16px 40px;min-height:calc(100vh - 58px);}
.page.active{display:block;}
.section-header{margin-bottom:20px;}
.section-title{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--navy);font-weight:700;}
.section-subtitle{font-size:.85rem;color:var(--gray-600);margin-top:4px;}

/* CHIPS */
.filter-row{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.chip{padding:7px 16px;border-radius:20px;border:1.5px solid var(--gray-200);background:var(--white);color:var(--gray-600);font-size:.8rem;font-weight:500;cursor:pointer;transition:var(--transition);white-space:nowrap;font-family:'DM Sans',sans-serif;}
.chip.active{background:var(--navy);border-color:var(--navy);color:var(--white);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 22px;border:none;border-radius:var(--radius-sm);font-size:.9rem;font-weight:600;cursor:pointer;transition:var(--transition);font-family:'DM Sans',sans-serif;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--navy);color:var(--white);}

/* PROGRESS */
.progress-bar{background:var(--gray-200);border-radius:10px;height:6px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--navy));border-radius:10px;transition:width .5s ease;}

/* TOAST */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:white;padding:12px 24px;border-radius:24px;font-size:.85rem;font-weight:500;opacity:0;transition:var(--transition);z-index:300;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* LOADER */
.loader{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--gray-400);gap:10px;font-size:.9rem;}
.spinner{width:20px;height:20px;border:2px solid var(--gray-200);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ─── FLASHCARD ─── */
.fc-meta{text-align:center;margin-bottom:14px;font-size:.85rem;color:var(--gray-600);font-weight:500;}

.flashcard-scene{perspective:1000px;margin-bottom:20px;cursor:pointer;}
.flashcard{position:relative;width:100%;aspect-ratio:5/3;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1);}
.flashcard.flipped{transform:rotateY(180deg);}
.flashcard-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-lg);}

/* FRONT */
.flashcard-front{display:flex;flex-direction:column;}
.flashcard-front.gender-m{background:linear-gradient(135deg,#0a1a40 0%,#0a2a6e 100%);}
.flashcard-front.gender-f{background:linear-gradient(135deg,#3a0a12 0%,#6e0a1e 100%);}
.flashcard-front.gender-v{background:linear-gradient(135deg,#1a2340 0%,#2c3e6e 100%);}

.fc-image{flex:1;position:relative;overflow:hidden;}
.fc-image img{width:100%;height:100%;object-fit:cover;display:block;}
.fc-image-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.75) 0%,rgba(0,0,0,.1) 60%);}
.fc-image-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:4rem;}
.fc-hint{position:absolute;top:12px;right:14px;font-size:.7rem;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:4px;}
.fc-front-content{padding:14px 18px 18px;position:absolute;bottom:0;left:0;right:0;}
.fc-article{font-size:1.1rem;font-weight:400;opacity:.85;margin-right:4px;}
.fc-word{font-family:'Playfair Display',serif;font-size:2.1rem;font-weight:700;line-height:1.1;}
.fc-word.gender-m{color:#00aaff;}
.fc-word.gender-f{color:#ff3355;}
.fc-word.gender-v{color:var(--white);}
.fc-phonetic{font-size:1rem;color:var(--gold-light);margin-top:5px;font-style:italic;letter-spacing:.02em;}

/* BACK */
.flashcard-back{transform:rotateY(180deg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;gap:12px;background:var(--cream);}
.fc-back-translation{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;text-align:center;}
.fc-back-translation.gender-m{color:#00aaff;}
.fc-back-translation.gender-f{color:#ff3355;}
.fc-back-translation.gender-v{color:var(--navy);}
.fc-back-subword{font-size:.9rem;color:var(--gray-400);text-align:center;}

/* SM2 BUTTONS — always visible */
.sm2-buttons{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:4px;}
.sm2-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:13px 8px;border:none;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);font-family:'DM Sans',sans-serif;}
.sm2-btn:active{transform:scale(.95);}
.sm2-btn-again{background:#fef0ee;color:var(--danger);}
.sm2-btn-hard{background:#fff8e6;color:var(--warning);}
.sm2-btn-easy{background:#edfaf2;color:var(--success);}
.sm2-btn-icon{font-size:1.3rem;}
.sm2-btn-label{font-size:.8rem;font-weight:600;}
.sm2-btn-interval{font-size:.68rem;color:var(--gray-600);}

.card-counter{text-align:center;margin-bottom:12px;}
.counter-text{font-size:.85rem;color:var(--gray-600);font-weight:500;}

.session-complete{text-align:center;padding:40px 24px;background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-md);}
.session-complete .trophy{font-size:4rem;margin-bottom:16px;}
.session-complete h2{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--navy);margin-bottom:8px;}
.session-complete p{color:var(--gray-600);font-size:.9rem;margin-bottom:24px;}
.session-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.sess-stat{padding:12px;border-radius:var(--radius-sm);background:var(--gray-100);}
.sess-stat-num{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;}
.sess-stat-label{font-size:.7rem;color:var(--gray-600);margin-top:2px;}

/* PRONUNCIATION — SWIPE CARD */
.pron-filters{display:flex;flex-direction:column;gap:12px;margin-bottom:16px;}
.pron-filter-row{display:flex;gap:8px;flex-wrap:wrap;}

/* Swipe container */
.pron-swipe-wrapper{position:relative;overflow:hidden;width:100%;touch-action:pan-y;}
.pron-swipe-track{display:flex;transition:transform .35s cubic-bezier(.4,0,.2,1);will-change:transform;}
.pron-slide{min-width:100%;padding:0 2px;}

/* Nav dots */
.pron-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.pron-nav-btn{background:var(--white);border:1.5px solid var(--gray-200);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;transition:var(--transition);}
.pron-nav-btn:disabled{opacity:.3;cursor:default;}
.pron-nav-btn:not(:disabled):hover{background:var(--navy);color:white;border-color:var(--navy);}
.pron-counter{font-size:.85rem;color:var(--gray-600);font-weight:500;}

.sentence-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-md);overflow:hidden;}
.sentence-card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px;border-bottom:1px solid var(--gray-100);}
.sentence-level-badge{font-size:.68rem;font-weight:700;letter-spacing:.08em;padding:3px 10px;border-radius:10px;background:var(--navy);color:var(--gold);}
.sentence-topic{font-size:.75rem;color:var(--gray-400);font-weight:500;flex:1;text-align:center;}
.sentence-text-area{padding:20px 16px 14px;}
.sentence-words{display:flex;flex-wrap:wrap;gap:8px;align-items:baseline;margin-bottom:14px;}
.word-token{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:600;color:var(--navy);padding:3px 6px;border-radius:8px;transition:all .25s ease;line-height:1.3;cursor:pointer;border:1.5px solid transparent;}
.word-token:hover{border-color:var(--gray-200);background:var(--gray-100);}
.word-token.highlighted{color:var(--white);background:var(--navy);border-color:var(--navy);}
.word-token.played{color:var(--gold);}
.word-popup{background:var(--navy);color:white;border-radius:10px;padding:8px 16px;margin:0 0 10px;font-size:.9rem;text-align:center;display:none;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.translation-box{padding:0 16px 14px;}
.translation-text-always{font-size:.9rem;color:var(--gray-600);font-style:italic;line-height:1.6;}
.audio-controls{padding:14px 16px;background:var(--gray-100);display:flex;align-items:center;gap:10px;}
.audio-play-btn{width:52px;height:52px;border-radius:50%;background:var(--navy);color:var(--white);border:none;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);flex-shrink:0;box-shadow:var(--shadow-sm);}
.audio-play-btn:active{transform:scale(.95);}
.audio-play-btn.playing{background:var(--gold);color:var(--navy);}
.audio-controls-right{flex:1;display:flex;flex-direction:column;gap:6px;}
.audio-chip{padding:5px 12px;border-radius:14px;border:1.5px solid var(--gray-200);background:var(--white);font-size:.72rem;font-weight:600;cursor:pointer;transition:var(--transition);color:var(--gray-600);font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:4px;}
.audio-chip.active{background:var(--navy);border-color:var(--navy);color:var(--white);}
.audio-option-row{display:flex;gap:6px;flex-wrap:wrap;}
.audio-progress{height:3px;background:var(--gray-200);border-radius:2px;overflow:hidden;margin-top:4px;}
.audio-progress-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .1s linear;width:0%;}
.pron-rating-row{display:flex;gap:8px;padding:10px 16px;justify-content:flex-end;border-top:1px solid var(--gray-100);}
.pron-fav-btn{background:none;border:none;cursor:pointer;font-size:1.2rem;padding:4px;transition:transform .2s;}
.pron-fav-btn:active{transform:scale(1.3);}
.countdown-bar{font-size:.75rem;color:var(--success);padding:4px 16px 8px;text-align:center;display:none;}

/* SETTINGS */
.settings-list{display:flex;flex-direction:column;gap:12px;}
.settings-group{background:var(--white);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);}
.settings-group-title{font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-400);padding:14px 16px 8px;}
.settings-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-top:1px solid var(--gray-100);gap:12px;}
.settings-item:first-of-type{border-top:none;}
.settings-item-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0;}
.settings-icon{width:36px;height:36px;border-radius:10px;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.settings-label{font-size:.9rem;font-weight:500;color:var(--navy);}
.settings-desc{font-size:.75rem;color:var(--gray-400);margin-top:2px;}
.toggle-switch{position:relative;width:44px;height:26px;flex-shrink:0;}
.toggle-switch input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--gray-200);border-radius:13px;cursor:pointer;transition:var(--transition);}
.toggle-slider:before{content:'';position:absolute;width:20px;height:20px;left:3px;bottom:3px;background:white;border-radius:50%;transition:var(--transition);box-shadow:0 2px 4px rgba(0,0,0,.15);}
.toggle-switch input:checked+.toggle-slider{background:var(--navy);}
.toggle-switch input:checked+.toggle-slider:before{transform:translateX(18px);}
.settings-select{border:1.5px solid var(--gray-200);border-radius:8px;padding:7px 12px;font-size:.85rem;color:var(--navy);background:var(--gray-100);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;outline:none;transition:var(--transition);}
.range-wrapper{display:flex;align-items:center;gap:10px;}
.range-value{font-size:.85rem;font-weight:600;color:var(--navy);min-width:28px;text-align:right;}
input[type=range]{-webkit-appearance:none;width:120px;height:4px;background:var(--gray-200);border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--navy);cursor:pointer;}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:16px;}
.stat-card{background:var(--gray-100);border-radius:var(--radius-sm);padding:14px;text-align:center;}
.stat-card-num{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:var(--navy);}
.stat-card-label{font-size:.72rem;color:var(--gray-600);margin-top:4px;}
.danger-btn{width:100%;padding:13px;background:#fef0ee;border:1.5px solid #f5c6c0;border-radius:var(--radius-sm);color:var(--danger);font-size:.875rem;font-weight:600;cursor:pointer;transition:var(--transition);font-family:'DM Sans',sans-serif;}
.version-badge{text-align:center;padding:20px;font-size:.75rem;color:var(--gray-400);}

@media(min-width:480px){.page{padding-left:20px;padding-right:20px;}}
  </style>
</head>

}

// ═══════════════════════════════
// SM-2
// ═══════════════════════════════
function sm2(card, quality) {
  let { ef=2.5, interval=0, reps=0 } = card || {};
  if (quality >= 3) {
    if (reps === 0) interval = 1;
    else if (reps === 1) interval = 6;
    else interval = Math.round(interval * ef);
    reps++;
    ef = Math.max(1.3, ef + 0.1 - (5-quality)*(0.08+(5-quality)*0.02));
  } else {
    reps = 0; interval = 1;
  }
  const nextReview = Date.now() + interval * 86400000;
  return { ef, interval, reps, nextReview };
}

function isDue(card) {
  if (!card) return true;
  return (card.nextReview || 0) <= Date.now();
}

const imageCache = {};
async function fetchPexelsImage(query, wordId) {
  if (imageCache[wordId]) return imageCache[wordId];
  const key = window.PEXELS_API_KEY || '';
  if (!key) return null;
  try {
    const res = await fetch(`https://api.pexels.com/v1/search?query=${encodeURIComponent(query)}&per_page=1&orientation=landscape`,{headers:{Authorization:key}});
    const data = await res.json();
    const url = data.photos?.[0]?.src?.medium || null;
    if (url) imageCache[wordId] = url;
    return url;
  } catch { return null; }
}

function toggleCard() {

  const el = document.getElementById('flashcard');
  if (el) el.classList.toggle('flipped', !cardShowingFR);
  // Her tıklamada ses çal — cinsiyete göre ses seç
  const card = sessionQueue[currentCardIndex];
  if (card) speakWord(card.word, card.gender);
}

async function loadCardContent(word) {
  cardShowingFR = true;
  // Kart yüklenince FR yüzünden başla, sesi çal
  setTimeout(() => speakWord(word.word, word.gender), 400);
  const imgUrl = await fetchPexelsImage(word.pexels_query||word.word, word.id);
  if (imgUrl) {
    const fcImage = document.getElementById('fc-image');
    if (fcImage) fcImage.innerHTML = `<img src="${imgUrl}" alt="${word.word}" loading="lazy"><div class="fc-image-overlay"></div>`;
  }
}

function rateCard(quality) {
  if (currentCardIndex >= sessionQueue.length) return;
  const word = sessionQueue[currentCardIndex];
  const existing = AppState.progress.cards[word.id] || {};
  AppState.progress.cards[word.id] = {...existing, ...sm2(existing, quality)};
  if (quality===0) sessionStats.again++;
  else if (quality===3) sessionStats.hard++;
  else sessionStats.easy++;
  saveState();

  currentCardIndex++;
  cardShowingFR = true; // Yeni kart her zaman FR yüzüyle başlasın

  const fcContent = document.getElementById('fc-content');
  if (!fcContent) return;
  if (currentCardIndex >= sessionQueue.length) {
    AppState.progress.totalSessions++;
    saveState();
    fcContent.innerHTML = renderSessionComplete();
    return;
  }
  fcContent.innerHTML = renderCardArea(sessionQueue);
  loadCardContent(sessionQueue[currentCardIndex]);
}

  allWords.forEach(w => {

  return `
    <div class="pron-slide">

            ${s.words.map((w,i)=>{
              const clean = w.toLowerCase().replace(/[^a-zàâçéèêëîïôûùüÿæœ']/gi,'');
              const meaning = wordMap[clean]||'';
              return `<span class="word-token" id="word-${s.id}-${i}" onclick="focusWord(event,'${s.id}',${i},'${w.replace(/'/g,"\\'")}','${meaning.replace(/'/g,"\\'")}')">

// ─── SWIPE ───
function initSwipe() {
  const wrapper = document.getElementById('pron-swipe-wrapper');
  if (!wrapper) return;
  let startX = 0;
  wrapper.addEventListener('touchstart', e=>{ startX = e.touches[0].clientX; }, {passive:true});
  wrapper.addEventListener('touchend', e=>{
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 50) slideGo(dx < 0 ? 1 : -1);
  }, {passive:true});
}

function slideGo(dir) {
  const sentences = getFilteredSentences();
  const next = currentSlideIndex + dir;
  if (next < 0 || next >= sentences.length) return;

  // Sesi durdur
  if (activeAudio) { activeAudio.pause(); activeAudio=null; }
  clearTimeout(autoPlayTimer);
  clearInterval(autoPlayCountdown);
  document.querySelectorAll('.audio-play-btn').forEach(b=>{b.classList.remove('playing');b.textContent='▶';});
  document.querySelectorAll('.countdown-bar').forEach(b=>{b.style.display='none';});

  currentSlideIndex = next;
  const track = document.getElementById('pron-track');
  if (track) track.style.transform = `translateX(-${currentSlideIndex*100}%)`;

  // Counter güncelle
  const counter = document.getElementById('pron-counter');
  if (counter) counter.textContent = `${currentSlideIndex+1} / ${sentences.length}`;

  // Butonları güncelle
  const prevBtn = document.getElementById('pron-prev');
  const nextBtn = document.getElementById('pron-next');
  if (prevBtn) prevBtn.disabled = currentSlideIndex===0;
  if (nextBtn) nextBtn.disabled = currentSlideIndex===sentences.length-1;

  // Otomatik ilerleme aktifse ses çal
  if (autoPlay) {
    setTimeout(()=>playSentence(sentences[currentSlideIndex].id), 300);
  }
}

function setPronFilter(f){ pronFilter=f; currentSlideIndex=0; renderPronunciation(); }
function setVoice(v){ currentVoice=v; renderPronunciation(); }
function setSpeed(s){ currentSpeed=s; renderPronunciation(); }
function toggleSpeedBtn(){ currentSpeed=currentSpeed==='slow'?'normal':'slow'; renderPronunciation(); }

function toggleAutoPlay() {
  autoPlay = !autoPlay;
  if (!autoPlay) {
    clearTimeout(autoPlayTimer);
    clearInterval(autoPlayCountdown);
    document.querySelectorAll('.countdown-bar').forEach(b=>{b.style.display='none';});
  }
  renderPronunciation();
}

// ─── FAVORİ ───
function toggleFavorite(id) {
  if (favorites.has(id)) favorites.delete(id);
  else favorites.add(id);
  saveFavorites();
  // Sadece ikonu güncelle, sayfayı yeniden render etme
  const btn = document.querySelector(`#card-${id} .pron-fav-btn`);
  if (btn) btn.textContent = favorites.has(id) ? '⭐' : '☆';
  showToast(favorites.has(id) ? '⭐ Favorilere eklendi' : 'Favorilerden çıkarıldı');
}

// ─── KELİME ODAK MODU ───
function focusWord(event, sentenceId, wordIndex, word, meaning) {
  event.stopPropagation();
  wordFocusActive = true;

  clearTimeout(autoPlayTimer);
  clearInterval(autoPlayCountdown);
  const countdown = document.getElementById(`countdown-${sentenceId}`);
  if (countdown) countdown.style.display='none';

  // Noktalama temizle, küçük harf
  const clean = word.replace(/[^a-zàâçéèêëîïôûùüÿæœ'-]/gi,'').toLowerCase().trim();

  // Ses — currentVoice'a göre
  const voiceGender = currentVoice === 'male' ? 'm' : 'f';
  speakWord(clean, voiceGender);

  // Anlam ara — allWords + genişletilmiş sözlük
  const lang = AppState.settings.language;
  let foundMeaning = '';

  // 1. allWords'de ara
  for (const w of allWords) {
    if (w.word.toLowerCase() === clean) {
      foundMeaning = lang==='tr' ? w.translation_tr : w.translation_en;
      break;
    }
  }

  // 2. Bulunamazsa mini sözlükte ara (gramer kelimeleri)
  if (!foundMeaning) {
    const miniDict = {
      tr: {
        'je':'ben','tu':'sen','il':'o (erkek)','elle':'o (kadın)','nous':'biz','vous':'siz','ils':'onlar (erkek)','elles':'onlar (kadın)',
        'le':'(eril artikel)','la':'(dişil artikel)','les':'(çoğul artikel)','un':'bir (eril)','une':'bir (dişil)','des':'(çoğul)',
        'est':'(olmak — o)','sont':'(olmak — onlar)','suis':'(olmak — ben)','es':'(olmak — sen)',
        'et':'ve','ou':'veya','mais':'ama','donc':'demek ki','car':'çünkü',
        'de':'nın/nın','du':'(de+le)','des':'(de+les)','en':'içinde/ile','à':'e/a/da',
        'que':'ki/ne','qui':'kim','quoi':'ne','où':'nerede','quand':'ne zaman','comment':'nasıl','pourquoi':'neden','combien':'kaç',
        'pas':'değil','ne':'(olumsuzluk)','plus':'daha fazla/artık','très':'çok','bien':'iyi/çok','aussi':'de/ayrıca',
        'avec':'ile','sans':'olmadan','pour':'için','sur':'üstünde','sous':'altında','dans':'içinde','devant':'önünde',
        'un':'bir','deux':'iki','trois':'üç','quatre':'dört','cinq':'beş',
        'bonjour':'merhaba','bonsoir':'iyi akşamlar','merci':'teşekkür','oui':'evet','non':'hayır','voilà':'işte',
        "m'appelle":"adım (kendim)","s'appelle":"adı (o)","appelle":"çağır/ara",
        'fait':'yapar/yapmak','beau':'güzel','beaucoup':'çok','peu':'az','même':'aynı/bile',
        'tout':'her şey/hepsi','tous':'hepsi','toute':'tüm','toutes':'tüm'
      },
      en: {
        'je':'I','tu':'you','il':'he','elle':'she','nous':'we','vous':'you (formal)','ils':'they','elles':'they (f)',
        'le':'the (m)','la':'the (f)','les':'the (pl)','un':'a (m)','une':'a (f)',
        'est':'is','sont':'are','suis':'am','es':'are (tu)',
        'et':'and','ou':'or','mais':'but','donc':'so','car':'because',
        'de':'of/from','en':'in/with','à':'to/at',
        'que':'that/what','qui':'who','où':'where','quand':'when','comment':'how','pourquoi':'why','combien':'how much',
        'pas':'not','très':'very','bien':'well/good','aussi':'also',
        'avec':'with','sans':'without','pour':'for','dans':'in','sur':'on',
        'bonjour':'hello','merci':'thank you','oui':'yes','non':'no',
        'fait':'does/makes','beau':'beautiful','beaucoup':'a lot','peu':'a little'
      }
    };
    foundMeaning = miniDict[lang]?.[clean] || '';
  }

  // Popup göster
  const popup = document.getElementById(`word-popup-${sentenceId}`);
  if (popup) {
    popup.textContent = foundMeaning ? `${clean} = ${foundMeaning}` : `"${clean}" — sözlükte yok`;
    popup.style.display = 'block';
    clearTimeout(popup._timer);
    popup._timer = setTimeout(()=>{
      popup.style.display='none';
      wordFocusActive = false;
    }, 3000);
  }
}

// ─── SM-2 CÜMLE PUANLAMA ───
function rateSentence(id, quality) {
  const existing = AppState.progress.sentences[id] || {};
  AppState.progress.sentences[id] = { ...existing, ...sm2(existing, quality), rating: quality };
  saveState();
  showToast(quality===5 ? '😄 Kolay!' : '😐 Zor');
  // Buton stillerini güncelle
  const card = document.getElementById(`card-${id}`);
  if (!card) return;
  card.querySelectorAll('.pron-rating-row .audio-chip').forEach(b=>{
    if (b.textContent.includes('Zor')) {
      Object.assign(b.style, quality===3 ? {background:'#fff8e6',borderColor:'#f39c12',color:'#f39c12'} : {background:'',borderColor:'',color:''});
    }
    if (b.textContent.includes('Kolay')) {
      Object.assign(b.style, quality===5 ? {background:'#edfaf2',borderColor:'#27ae60',color:'#27ae60'} : {background:'',borderColor:'',color:''});
    }
  });
}

function playSentence(id) { playWithSettings(id, currentVoice, currentSpeed); }

async function playWithSettings(sentenceId, voice, speed) {
  const sentence = allSentences.find(s=>s.id===sentenceId);
  if (!sentence) return;

  if (activeAudio) { activeAudio.pause(); activeAudio=null; }
  clearTimeout(autoPlayTimer);
  clearInterval(autoPlayCountdown);

  document.querySelectorAll('.audio-play-btn').forEach(b=>{b.classList.remove('playing');b.textContent='▶';});
  document.querySelectorAll('.countdown-bar').forEach(b=>{b.style.display='none';});

  const isSlow = speed==='slow';
  const playBtn = document.getElementById(`play-${sentenceId}`);
  const statusEl = document.getElementById(`play-status-${sentenceId}`);
  if (playBtn){playBtn.classList.add('playing');playBtn.textContent='⏸';}
  if (statusEl) statusEl.textContent='Oynatılıyor...';

  // iOS unlock
  const audio = new Audio();
  activeAudio = audio;
  audio.play().catch(()=>{});

  const gender = voice==='male'?'m':'f';
  const audioSrc = await playTTS(sentence.sentence, gender, isSlow);

  if (!audioSrc) {
    if (playBtn){playBtn.classList.remove('playing');playBtn.textContent='▶';}
    return;
  }

  audio.src = audioSrc;

  const words = sentence.words;
  const totalDuration = isSlow ? sentence.sentence.length*80 : sentence.sentence.length*45;
  const wordDuration = totalDuration / words.length;
  let wordIndex = 0;

  const hi = setInterval(()=>{
    if (wordIndex>=words.length){clearInterval(hi);return;}
    words.forEach((_,i)=>{
      const el=document.getElementById(`word-${sentenceId}-${i}`);
      if(el){el.classList.remove('highlighted');el.classList.add('played');}
    });
    const el=document.getElementById(`word-${sentenceId}-${wordIndex}`);
    if(el){el.classList.remove('played');el.classList.add('highlighted');}
    const fill=document.getElementById(`progress-fill-${sentenceId}`);
    if(fill) fill.style.width=`${((wordIndex+1)/words.length)*100}%`;
    wordIndex++;
  }, wordDuration);

  audio.onended = ()=>{
    clearInterval(hi);
    if(playBtn){playBtn.classList.remove('playing');playBtn.textContent='▶';}
    if(statusEl) statusEl.textContent=sentence.sentence.length>45?sentence.sentence.substring(0,45)+'...':sentence.sentence;
    words.forEach((_,i)=>{const el=document.getElementById(`word-${sentenceId}-${i}`);if(el)el.classList.remove('highlighted');});
    const fill=document.getElementById(`progress-fill-${sentenceId}`);
    if(fill) fill.style.width='0%';

    // SR güncelle
    const existing = AppState.progress.sentences[sentenceId]||{};
    if (!existing.rating) {
      AppState.progress.sentences[sentenceId]={...existing,...sm2(existing,4)};
      saveState();
    }

    // Otomatik ilerleme
    if (autoPlay && !wordFocusActive) {
      const sentences = getFilteredSentences();
      const idx = sentences.findIndex(s=>s.id===sentenceId);
      if (idx < sentences.length-1) {
        const countdownEl = document.getElementById(`countdown-${sentenceId}`);
        let secs = 3;
        if (countdownEl) { countdownEl.style.display='block'; countdownEl.textContent=`Sonraki: ${secs}sn...`; }
        autoPlayCountdown = setInterval(()=>{
          secs--;
          if (countdownEl) countdownEl.textContent = secs>0 ? `Sonraki: ${secs}sn...` : '→';
          if (secs<=0) clearInterval(autoPlayCountdown);
        }, 1000);
        autoPlayTimer = setTimeout(()=>{
          if (!wordFocusActive) slideGo(1);
        }, 3000);
      } else {
        const countdownEl = document.getElementById(`countdown-${sentenceId}`);
        if (countdownEl){ countdownEl.style.display='block'; countdownEl.textContent='✓ Liste tamamlandı!'; }
      }
    }
  };

  audio.onerror=()=>{
    clearInterval(hi);
    if(playBtn){playBtn.classList.remove('playing');playBtn.textContent='▶';}
    showToast('Ses çalınamadı');
  };
  audio.load();
  audio.play().catch(()=>{if(playBtn){playBtn.classList.remove('playing');playBtn.textContent='▶';}});
}

function updateSentenceSR(id) {
  const existing=AppState.progress.sentences[id]||{};
  AppState.progress.sentences[id]={...existing,...sm2(existing,4)};
  saveState();
}

// SETTINGS

  const p=AppState.progress;

  const learnedCards=Object.values(p.cards).filter(c=>c.reps>0&&!isDue(c)).length;
  const studyDays=p.studyDays.size;
  const totalRatings=Object.values(p.cards).reduce((a,c)=>a+(c.reps||0),0);
  const accuracy=totalRatings>0?Math.round((Object.values(p.cards).reduce((a,c)=>a+(c.easy||0),0)/totalRatings)*100):0;

  page.innerHTML=`
    <div class="section-header">
      <h1 class="section-title">${t('settings.title')}</h1>
      <p class="section-subtitle">${t('settings.subtitle')}</p>
    </div>
    <div class="settings-list">
      <div class="settings-group">
        <div class="settings-group-title">${t('settings.pronunciation')}</div>
        <div class="settings-item">
          <div class="settings-item-left"><div class="settings-icon">🎙️</div><div><div class="settings-label">${t('settings.defaultVoice')}</div></div></div>
          <select class="settings-select" onchange="updateSetting('voice',this.value)">
            <option value="female" ${s.voice==='female'?'selected':''}>${t('settings.female')}</option>
            <option value="male" ${s.voice==='male'?'selected':''}>${t('settings.male')}</option>
          </select>
        </div>
        <div class="settings-item">
          <div class="settings-item-left"><div class="settings-icon">🐢</div><div><div class="settings-label">${t('settings.defaultSpeed')}</div></div></div>
          <select class="settings-select" onchange="updateSetting('speed',this.value)">
            <option value="normal" ${s.speed==='normal'?'selected':''}>${t('settings.normal')}</option>
            <option value="slow" ${s.speed==='slow'?'selected':''}>${t('settings.slow')}</option>
          </select>
        </div>
        <div class="settings-item">
          <div class="settings-item-left"><div class="settings-icon">🔤</div><div><div class="settings-label">${t('settings.showPhonetic')}</div><div class="settings-desc">${t('settings.showPhoneticDesc')}</div></div></div>
          <label class="toggle-switch"><input type="checkbox" ${s.showPhonetic?'checked':''} onchange="updateSetting('showPhonetic',this.checked)"><span class="toggle-slider"></span></label>
        </div>
      </div>
      <div class="settings-group">
        <div class="settings-group-title">${t('settings.language')}</div>
        <div class="settings-item">
          <div class="settings-item-left"><div class="settings-icon">🌍</div><div><div class="settings-label">${t('settings.appLanguage')}</div></div></div>
          <select class="settings-select" onchange="setLanguage(this.value)">
            <option value="tr" ${s.language==='tr'?'selected':''}>Türkçe</option>
            <option value="en" ${s.language==='en'?'selected':''}>English</option>
          </select>
        </div>
      </div>
      <div class="settings-group">
        <div class="settings-group-title">${t('settings.progress')}</div>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-card-num">${totalCards}</div><div class="stat-card-label">${t('settings.totalCards')}</div></div>
          <div class="stat-card"><div class="stat-card-num" style="color:var(--success)">${learnedCards}</div><div class="stat-card-label">${t('settings.learnedCards')}</div></div>
          <div class="stat-card"><div class="stat-card-num" style="color:var(--gold)">${studyDays}</div><div class="stat-card-label">${t('settings.studyDays')}</div></div>
          <div class="stat-card"><div class="stat-card-num" style="color:var(--blue)">${accuracy}%</div><div class="stat-card-label">${t('settings.accuracy')}</div></div>
        </div>
        <div style="padding:0 16px 16px">
          <button class="danger-btn" onclick="confirmReset()">🗑️ ${t('settings.resetProgress')}</button>
        </div>
      </div>
    </div>
    <div class="version-badge">${t('settings.version')}</div>
  `;
}

function updateSetting(key,value) {
  AppState.settings[key]=value;
  saveState();
}

function confirmReset() {
  if (confirm(t('settings.resetConfirm'))) {
    AppState.progress.cards={};
    AppState.progress.sentences={};
    AppState.progress.studyDays=new Set();
    AppState.progress.totalSessions=0;
    saveState();
    renderSettings();
    showToast('✓ Sıfırlandı');
  }
}

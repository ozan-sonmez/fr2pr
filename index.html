<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Fransızca öğrenme uygulaması — TCF uyumlu kelimeler ve cümleler">
  <meta name="theme-color" content="#1a2340">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Le Français — Fransızca Öğren</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/flashcards.css">
  <link rel="stylesheet" href="css/pronunciation.css">
  <link rel="stylesheet" href="css/settings.css">

  <!-- Pexels API Key — Replace with your key from pexels.com/api -->
  <script>
    window.PEXELS_API_KEY = 'YOUR_PEXELS_API_KEY_HERE';
  </script>
</head>
<body>

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-inner">
      <div class="app-logo">
        <span>🇫🇷</span> Le Français
      </div>
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="tr">TR</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
    </div>
  </header>

  <!-- PAGES -->
  <main>

    <!-- FLASHCARDS -->
    <section class="page active" id="page-flashcards">
      <div class="loader">
        <div class="spinner"></div>
        Yükleniyor...
      </div>
    </section>

    <!-- PRONUNCIATION -->
    <section class="page" id="page-pronunciation">
      <div class="loader">
        <div class="spinner"></div>
        Yükleniyor...
      </div>
    </section>

    <!-- SETTINGS -->
    <section class="page" id="page-settings">
      <div class="loader">
        <div class="spinner"></div>
        Yükleniyor...
      </div>
    </section>

  </main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-page="flashcards">
      <span class="nav-icon">🃏</span>
      <span class="nav-label" data-i18n="nav.flashcards">Kartlar</span>
    </button>
    <button class="nav-item" data-page="pronunciation">
      <span class="nav-icon">🎧</span>
      <span class="nav-label" data-i18n="nav.pronunciation">Telaffuz</span>
    </button>
    <button class="nav-item" data-page="settings">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label" data-i18n="nav.settings">Ayarlar</span>
    </button>
  </nav>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- JS — order matters -->
  <script src="js/i18n.js"></script>
  <script src="js/app.js"></script>
  <script src="js/flashcards.js"></script>
  <script src="js/pronunciation.js"></script>
  <script src="js/settings.js"></script>

</body>
</html>
